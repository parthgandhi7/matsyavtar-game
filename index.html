<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Matsyavatar - The Great Deluge</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 50% 20%, #174067 0%, #0d213c 45%, #070f20 100%);
    }
    #game { display: block; width: 100vw; height: 100vh; }
    .hud {
      position: fixed; inset: 0; pointer-events: none; color: #eaf6ff; padding: 10px 12px;
      display: flex; justify-content: space-between; align-items: flex-start; z-index: 5;
      font-family: "Trebuchet MS", "Arial Black", sans-serif; letter-spacing: 0.5px;
    }
    .hud .panel {
      background: rgba(5, 16, 33, 0.5); border: 1px solid rgba(220, 240, 255, 0.2); border-radius: 12px;
      padding: 8px 12px; backdrop-filter: blur(4px); font-size: clamp(13px, 2.8vw, 18px);
    }
    #message {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      color: white; text-align: center; width: min(90vw, 540px); padding: 20px;
      border-radius: 14px; background: rgba(2, 10, 22, 0.74); border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(5px); z-index: 6;
    }
    #message h1 { font-size: clamp(24px, 5vw, 40px); margin-bottom: 8px; }
    #message p { line-height: 1.5; opacity: 0.95; }
    #message button {
      margin-top: 14px; pointer-events: all; border: 0; border-radius: 10px; padding: 10px 16px;
      font-size: 16px; font-weight: 700; color: #042136; background: #9ce8ff;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="panel" id="stats">Score: 0m</div>
    <div class="panel" id="hearts">❤ ❤ ❤</div>
  </div>
  <div id="message">
    <h1>Matsyavatar - The Great Deluge</h1>
    <p>Touch and guide Matsya. The fish tracks 100px above your finger, towing Manu's boat via a momentum rope.</p>
    <button id="startBtn">Start Voyage</button>
  </div>

  <script type="module">
import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';

class Whirlpool {
  constructor(x, z, radius) {
    this.type = 'whirlpool'; this.x = x; this.z = z; this.radius = radius;
    this.spin = Math.random() * Math.PI * 2; this.spinSpeed = 2.8;
  }
  update(dt, speed) { this.z += speed * dt; this.spin += this.spinSpeed * dt; }
}

class Scene3D {
  constructor(canvas, state, getPlayfield) {
    this.canvas = canvas; this.state = state; this.getPlayfield = getPlayfield;
    this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    this.renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
    this.renderer.outputColorSpace = THREE.SRGBColorSpace;

    this.scene = new THREE.Scene();
    this.scene.fog = new THREE.Fog(0x0a2240, 80, 330);
    this.camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 600);
    this.camera.position.set(0, 26, 54);
    this.camera.lookAt(0, 8, -80);

    this.scene.add(new THREE.AmbientLight(0x8fbce0, 0.8));
    const sun = new THREE.DirectionalLight(0xd6ecff, 1.2);
    sun.position.set(35, 80, 30);
    this.scene.add(sun);

    this.assets = this.createAssetPack();
    const waterGeo = new THREE.PlaneGeometry(340, 1200, 64, 64);
    const waterMat = new THREE.MeshStandardMaterial({ color: 0x114a72, roughness: 0.45, metalness: 0.08 });
    this.water = new THREE.Mesh(waterGeo, waterMat);
    this.water.rotation.x = -Math.PI / 2;
    this.water.position.y = -8;
    this.scene.add(this.water);

    this.ropeCurve = new THREE.CatmullRomCurve3([new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()]);
    this.ropePoints = this.ropeCurve.getPoints(18);
    this.rope = new THREE.Line(new THREE.BufferGeometry().setFromPoints(this.ropePoints), this.assets.materials.rope);
    this.scene.add(this.rope);

    this.fish = this.createFish();
    this.boat = this.createBoat();
    this.scene.add(this.fish.group);
    this.scene.add(this.boat.group);

    this.whirlpoolMeshes = [];
    this.maxDebris = 120;
    const debrisGeo = new THREE.BoxGeometry(1, 0.45, 0.5);
    const debrisMat = new THREE.MeshStandardMaterial({ color: 0x6a412d, roughness: 0.9 });
    this.debrisInst = new THREE.InstancedMesh(debrisGeo, debrisMat, this.maxDebris);
    this.debrisInst.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    this.scene.add(this.debrisInst);
  }
  createAssetPack() {
    const lodScale = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 0.5 : 1;
    return {
      mobileTextureSize: lodScale < 1 ? 512 : 1024,
      materials: {
        fishBody: new THREE.MeshStandardMaterial({ color: 0x7deeff, emissive: 0x18495d, emissiveIntensity: 0.45, roughness: 0.35, metalness: 0.15 }),
        fishOrnament: new THREE.MeshStandardMaterial({ color: 0xcda748, emissive: 0x5a3b12, emissiveIntensity: 0.6, roughness: 0.2, metalness: 0.8 }),
        divineGlow: new THREE.MeshStandardMaterial({ color: 0xb9f4ff, emissive: 0x5ed8ff, emissiveIntensity: 1.15, roughness: 0.1, metalness: 0.35, transparent: true, opacity: 0.74 }),
        carvedWood: new THREE.MeshStandardMaterial({ color: 0x8d5938, roughness: 0.85, metalness: 0.1 }),
        clothPassenger: new THREE.MeshStandardMaterial({ color: 0xe0cf9a, roughness: 0.92, metalness: 0.03 }),
        rope: new THREE.LineBasicMaterial({ color: 0xf1eac8 })
      }
    };
  }
  createFish() {
    const group = new THREE.Group();
    const bodyGeo = new THREE.CapsuleGeometry(1, 2.2, 8, 14);
    const skinIdx = [], skinW = [];
    const pos = bodyGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i) + 1.6;
      const t = THREE.MathUtils.clamp(x / 3.2, 0, 1);
      skinIdx.push(0, 1, 0, 0);
      skinW.push(1 - t, t, 0, 0);
    }
    bodyGeo.setAttribute('skinIndex', new THREE.Uint16BufferAttribute(skinIdx, 4));
    bodyGeo.setAttribute('skinWeight', new THREE.Float32BufferAttribute(skinW, 4));
    const bones = [new THREE.Bone(), new THREE.Bone()];
    bones[0].position.set(0, 0, 0); bones[1].position.set(1.5, 0, 0); bones[0].add(bones[1]);
    const skinned = new THREE.SkinnedMesh(bodyGeo, this.assets.materials.fishBody);
    skinned.add(bones[0]); skinned.bind(new THREE.Skeleton(bones));
    skinned.rotation.z = Math.PI / 2;
    const tail = new THREE.Mesh(new THREE.ConeGeometry(0.65, 1.1, 4), this.assets.materials.fishBody);
    tail.rotation.z = -Math.PI / 2; tail.position.set(-2.2, 0, 0);
    const ornament = new THREE.Mesh(new THREE.TorusGeometry(0.62, 0.12, 8, 18), this.assets.materials.fishOrnament);
    ornament.rotation.y = Math.PI / 2; ornament.position.set(0.45, 0.2, 0);
    const halo = new THREE.Mesh(new THREE.SphereGeometry(0.45, 14, 14), this.assets.materials.divineGlow);
    halo.position.set(1.15, 0.18, 0);
    group.add(skinned, tail, ornament, halo);
    return { group, skinned, bones };
  }
  createBoat() {
    const group = new THREE.Group();
    const hull = new THREE.Mesh(new THREE.BoxGeometry(4.2, 1.3, 2.2), this.assets.materials.carvedWood);
    group.add(hull);
    const passengerOffsets = [
      [-1.35, 0.8, 0.54], [-0.8, 0.84, -0.54], [-0.3, 0.8, 0.54], [0.15, 0.84, -0.54],
      [0.65, 0.8, 0.54], [1.1, 0.84, -0.54], [0, 1.02, 0]
    ];
    for (const [x, y, z] of passengerOffsets) {
      const p = new THREE.Mesh(new THREE.CapsuleGeometry(0.19, 0.42, 3, 6), this.assets.materials.clothPassenger);
      p.position.set(x, y, z);
      group.add(p);
    }
    const prowAccent = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.08, 6, 16), this.assets.materials.fishOrnament);
    prowAccent.position.set(2.05, 0.4, 0); prowAccent.rotation.y = Math.PI / 2;
    group.add(prowAccent);
    return { group };
  }
  resize() { this.renderer.setSize(innerWidth, innerHeight, false); this.camera.aspect = innerWidth / innerHeight; this.camera.updateProjectionMatrix(); }
  toWorld(x, y) {
    const nx = (x / innerWidth) * 2 - 1, ny = -(y / innerHeight) * 2 + 1;
    return new THREE.Vector3(nx * 28, (0.5 - y / innerHeight) * 22, -ny * 120 - 90);
  }
  render(dt) {
    const s = this.state;
    this.water.position.z = (this.water.position.z + s.worldSpeed * dt * 0.12) % 50 - 25;

    const fishW = this.toWorld(s.fish.x, s.fish.y);
    const boatW = this.toWorld(s.boat.x, s.boat.y);
    const fishAnchor = fishW.clone().add(new THREE.Vector3(-1.45, 1.7, 0));
    const boatAnchor = boatW.clone().add(new THREE.Vector3(2.2, 1, 0));
    this.fish.group.position.copy(fishW);
    this.fish.group.position.y += 2.5;
    this.fish.group.rotation.y = s.fish.heading;
    this.fish.bones[1].rotation.y = Math.sin(performance.now() * 0.01) * 0.45;
    this.fish.group.traverse((m) => { if (m.material) m.material.opacity = s.fish.alpha; if (m.material) m.material.transparent = s.fish.alpha < 1; });

    this.boat.group.position.copy(boatW);
    this.boat.group.rotation.z = s.boat.roll;
    this.boat.group.rotation.x = s.boat.pitch;
    this.camera.position.lerp(boatW.clone().add(new THREE.Vector3(0, 20, 46)), 1 - Math.exp(-4.5 * dt));
    this.camera.lookAt(boatW.x, boatW.y + 3, boatW.z - 120);

    const mid = fishAnchor.clone().lerp(boatAnchor, 0.5);
    mid.y -= 1.6 + Math.abs(s.boat.vy) * 0.004;
    this.ropeCurve.points[0].copy(boatAnchor);
    this.ropeCurve.points[1].copy(boatAnchor.clone().lerp(mid, 0.35));
    this.ropeCurve.points[2].copy(fishAnchor.clone().lerp(mid, 0.35));
    this.ropeCurve.points[3].copy(fishAnchor);
    this.rope.geometry.setFromPoints(this.ropeCurve.getPoints(18));

    this.whirlpoolMeshes.forEach((m) => this.scene.remove(m));
    this.whirlpoolMeshes = [];
    let debrisIndex = 0;
    const dummy = new THREE.Object3D();
    for (const o of s.obstacles) {
      const p = this.toWorld(o.x, s.boat.y);
      p.z = o.z;
      if (o.type === 'whirlpool') {
        const ring = new THREE.Mesh(new THREE.TorusGeometry(o.radius / 18, 0.12, 10, 28), new THREE.MeshStandardMaterial({ color: 0x9ad4ff, emissive: 0x12314a }));
        ring.rotation.x = Math.PI / 2;
        ring.rotation.z = o.spin;
        ring.position.copy(p);
        this.whirlpoolMeshes.push(ring);
        this.scene.add(ring);
      } else if (debrisIndex < this.maxDebris) {
        dummy.position.copy(p);
        dummy.rotation.set(0, 0, o.angle);
        dummy.scale.set(o.w / 14, 1, (o.d || o.h) / 14);
        dummy.updateMatrix();
        this.debrisInst.setMatrixAt(debrisIndex++, dummy.matrix);
      }
    }
    this.debrisInst.count = debrisIndex;
    this.debrisInst.instanceMatrix.needsUpdate = true;

    this.renderer.render(this.scene, this.camera);
  }
}

class Game {
  constructor() {
    this.canvas = document.getElementById('game');
    this.statsEl = document.getElementById('stats');
    this.heartsEl = document.getElementById('hearts');
    this.messageEl = document.getElementById('message');
    this.startBtn = document.getElementById('startBtn');
    this.state = this.createState();
    this.scene3d = new Scene3D(this.canvas, this.state, () => this.getPlayfield());
    this.bind(); this.resize(); requestAnimationFrame((t) => this.loop(t));
  }
  createState() { return { running:false, won:false, lost:false, health:3, score:0, worldSpeed:190, lastTime:0, obstacles:[], rain:[], spawnTimer:0, fish:{x:0,y:0,tx:0,ty:0,radius:18,alpha:1,flashTimer:0,heading:0}, boat:{x:0,y:0,vx:0,vy:0,w:82,h:36,pitch:0,roll:0}, pointer:{x:0,y:0,active:false}, damageCooldown:0, shake:0, shakePower:0, lanes:3, spawnZ:-320, despawnZ:90 }; }
  getPlayfield(){ const w=innerWidth,h=innerHeight,width=Math.min(420,w-24),left=(w-width)/2; return {left,right:left+width,width,top:14,bottom:h-14}; }
  bind(){ addEventListener('resize',()=>this.resize()); addEventListener('pointermove',(e)=>this.trackPointer(e)); addEventListener('pointerdown',(e)=>{this.state.pointer.active=true;this.trackPointer(e);}); addEventListener('pointerup',()=>this.state.pointer.active=false); this.startBtn.addEventListener('click',()=>this.startGame()); }
  trackPointer(e){ this.state.pointer.x=e.clientX; this.state.pointer.y=e.clientY-100; }
  resize(){ this.scene3d.resize(); if(!this.state.running) this.resetEntities(); }
  resetEntities(){ const s=this.state,w=innerWidth,h=innerHeight; s.fish.x=w*0.5;s.fish.y=h*0.74;s.fish.tx=s.fish.x;s.fish.ty=s.fish.y;s.fish.heading=0; s.boat.x=w*0.5;s.boat.y=h*0.88;s.boat.vx=0;s.boat.vy=0;s.boat.pitch=0;s.boat.roll=0; s.pointer.x=s.fish.x;s.pointer.y=s.fish.y;s.obstacles=[]; }
  spawnObstacle(){ const pf=this.getPlayfield(),lane=Math.floor(Math.random()*this.state.lanes),center=pf.left+(lane+0.5)*(pf.width/this.state.lanes),z=this.state.spawnZ-Math.random()*140; if(Math.random()<0.55) this.state.obstacles.push(new Whirlpool(center+(Math.random()-0.5)*24,z,24+Math.random()*16)); else this.state.obstacles.push({type:'debris',x:center+(Math.random()-0.5)*32,z,w:42+Math.random()*52,h:20+Math.random()*22,d:18+Math.random()*16,angle:(Math.random()-0.5)*0.35}); }
  takeDamage(){ const s=this.state;if(s.damageCooldown>0) return; s.health-=1;s.damageCooldown=0.55;s.fish.flashTimer=2;s.shake=0.22;s.shakePower=12; }
  update(dt){ const s=this.state;if(!s.running) return; const h=innerHeight,pf=this.getPlayfield(); s.score+=(s.worldSpeed*dt)/10; s.spawnTimer-=dt; if(s.spawnTimer<=0){s.spawnTimer=0.55+Math.random()*0.45; this.spawnObstacle();} s.damageCooldown=Math.max(0,s.damageCooldown-dt); s.fish.flashTimer=Math.max(0,s.fish.flashTimer-dt); s.fish.alpha=s.fish.flashTimer>0?(Math.sin((2-s.fish.flashTimer)*30)>0?1:0.5):1;
  s.fish.tx=this.clamp(s.pointer.x,pf.left+26,pf.right-26); s.fish.ty=this.clamp(s.pointer.y,h*0.42,h-38); const ease=1-Math.exp(-8*dt); s.fish.x+=(s.fish.tx-s.fish.x)*ease; s.fish.y+=(s.fish.ty-s.fish.y)*ease; const fishVx=(s.fish.tx-s.fish.x)*2.6; s.fish.heading=THREE.MathUtils.clamp(fishVx/240,-0.6,0.6);
  const dx=s.fish.x-s.boat.x,dy=s.fish.y-s.boat.y,spring=3.9,damping=0.92; s.boat.vx+=dx*spring*dt; s.boat.vy+=(dy+18)*spring*dt; s.boat.vx*=damping; s.boat.vy*=damping; s.boat.x+=s.boat.vx*dt*60; s.boat.y+=s.boat.vy*dt*60; s.boat.x=this.clamp(s.boat.x,pf.left+24,pf.right-24); s.boat.y=this.clamp(s.boat.y,h*0.58,h-24); s.boat.roll=THREE.MathUtils.clamp(-s.boat.vx/280,-0.35,0.35); s.boat.pitch=THREE.MathUtils.clamp(s.boat.vy/420,-0.2,0.2);
  const boatSphere={x:s.boat.x,y:s.boat.y,z:0,r:Math.max(s.boat.w,s.boat.h)*0.36};
  const fishSphere={x:s.fish.x,y:s.fish.y,z:-20,r:s.fish.radius*0.9};
  s.obstacles=s.obstacles.filter(o=>o.z<s.despawnZ);
  for(const o of s.obstacles){
    if(o.type==='whirlpool'){
      o.update(dt,s.worldSpeed);
      if(this.sphereHit(boatSphere,{x:o.x,y:s.boat.y,z:o.z,r:o.radius*0.9})||this.sphereHit(fishSphere,{x:o.x,y:s.fish.y,z:o.z,r:o.radius*0.75})) this.takeDamage();
    } else {
      o.z += s.worldSpeed*dt;
      const boatHit=this.sphereBoxHit(boatSphere,{x:o.x,y:s.boat.y,z:o.z,w:o.w,h:o.h,d:o.d});
      const fishHit=this.sphereBoxHit(fishSphere,{x:o.x,y:s.fish.y,z:o.z,w:o.w*0.9,h:o.h,d:o.d});
      if(boatHit||fishHit) this.takeDamage();
    }
  }
  if(s.shake>0){s.shake-=dt;s.shakePower*=0.9;} if(s.health<=0){s.running=false;s.lost=true;this.showEnd(false);} this.statsEl.textContent=`Score: ${Math.floor(s.score)}m`; this.heartsEl.textContent='❤ '.repeat(Math.max(0,s.health)).trim()||'—'; }
  sphereHit(a,b){const dx=a.x-b.x,dy=a.y-b.y,dz=a.z-b.z;return dx*dx+dy*dy+dz*dz<(a.r+b.r)*(a.r+b.r);}
  sphereBoxHit(s,b){const nx=this.clamp(s.x,b.x-b.w/2,b.x+b.w/2),ny=this.clamp(s.y,b.y-b.h/2,b.y+b.h/2),nz=this.clamp(s.z,b.z-b.d/2,b.z+b.d/2),dx=s.x-nx,dy=s.y-ny,dz=s.z-nz;return dx*dx+dy*dy+dz*dz<s.r*s.r;}
  clamp(v,min,max){return Math.max(min,Math.min(max,v));}
  startGame(){Object.assign(this.state,this.createState(),{running:true}); this.resetEntities(); this.state.spawnTimer=0.3; this.messageEl.classList.add('hidden'); this.statsEl.textContent='Score: 0m'; this.heartsEl.textContent='❤ ❤ ❤';}
  showEnd(win){ this.messageEl.classList.remove('hidden'); this.messageEl.innerHTML=win?`<h1>The Ark Endures</h1><p>You reached ${Math.floor(this.state.score)}m.</p><button id="restartBtn">Sail Again</button>`:`<h1>The Rope Snaps</h1><p>You reached ${Math.floor(this.state.score)}m. Try again.</p><button id="restartBtn">Retry</button>`; document.getElementById('restartBtn').addEventListener('click',()=>this.startGame()); }
  loop(t){const now=t/1000,dt=Math.min(0.033,now-(this.state.lastTime||now));this.state.lastTime=now;this.update(dt);this.scene3d.render(dt);requestAnimationFrame((n)=>this.loop(n));}
}
new Game();

  </script>
</body>
</html>
